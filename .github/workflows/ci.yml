name: CI

on:
  push:
    paths:
      - '**.py'
      - '**.j2'
      - '**.json'
  pull_request:
    paths:
      - '**.py'
      - '**.j2'
      - '**.json'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint jinja2 pillow pytest
      - name: Run tests
        run: |
          cd DoctorMandDesign
          pytest -q
      - name: Verify demo output
        run: |
          cd DoctorMandDesign
          python generate.py --data example-data.json --output output/demo_demo.pdf
          python verify.py output/demo_demo.pdf
