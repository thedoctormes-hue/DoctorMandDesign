name: CI

on:
  push:
    paths:
      - '**.py'
      - '**.j2'
      - '**.json'
  pull_request:
    paths:
      - '**.py'
      - '**.j2'
      - '**.json'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint jinja2 pillow pytest colour-science
      - name: Install Tesseract OCR (for verification)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils
      - name: Run tests
        run: |
          cd DoctorMandDesign
          pytest -q
      - name: Verify demo output
        run: |
          cd DoctorMandDesign
          python generate.py --data example-data.json --output output/demo_demo.pdf
          python verify.py output/demo_demo.pdf
      - name: Generate release PDFs
        run: |
          cd DoctorMandDesign
          python generate.py --data example-data.json --output output/poliscop_ru.pdf
          python generate.py --data example-data.en.json --output output/poliscop_en.pdf
      - name: Upload to Yandex Disk and notify Telegram
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x DoctorMandDesign/scripts/publish_to_yandex.sh
          ./DoctorMandDesign/scripts/publish_to_yandex.sh DoctorMandDesign/output/poliscop_ru.pdf "New release: Russian version"
          ./DoctorMandDesign/scripts/publish_to_yandex.sh DoctorMandDesign/output/poliscop_en.pdf "New release: English version"